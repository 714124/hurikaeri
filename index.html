<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>きょうのふりかえりシート（視覚強化版）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kiwi Maru', serif;
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            padding: 15px;
            touch-action: manipulation;
        }
        .sheet {
            background: white;
            width: 100%;
            max-width: 800px;
            border: 6px solid #4ade80;
            border-radius: 40px;
            padding: 30px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.05);
            position: relative;
        }
        /* 選択肢の共通スタイル */
        .card-choice {
            cursor: pointer;
            transition: all 0.2s ease;
            border: 4px solid #f1f5f9;
            border-radius: 24px;
            background: white;
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        .card-choice.selected {
            border-color: #22c55e;
            background-color: #f0fdf4;
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(34, 197, 94, 0.2);
        }
        .card-choice.selected .icon-circle {
            transform: scale(1.1);
        }

        /* アイコンの土台 */
        .icon-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin-bottom: 10px;
            transition: all 0.2s;
            border: 3px solid rgba(0,0,0,0.05);
        }

        /* カラーバリエーション */
        .color-good { background-color: #dcfce7; }
        .color-normal { background-color: #e0f2fe; }
        .color-hard { background-color: #ffedd5; }

        /* ロック状態 */
        .locked-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 120px;
            z-index: 100;
            background: rgba(255, 255, 255, 0.2);
            cursor: not-allowed;
        }
        .is-locked .locked-overlay { display: block; }
        .is-locked input, .is-locked textarea { background: #f1f5f9; cursor: not-allowed; }
        .is-locked .card-choice { opacity: 0.7; pointer-events: none; }

        @media print {
            .no-print { display: none; }
            .is-locked .locked-overlay { display: none; }
        }
    </style>
</head>
<body>

    <div id="mainSheet" class="sheet">
        <div class="locked-overlay rounded-t-[40px]"></div>

        <!-- ヘッダー -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 border-b-4 border-dashed border-green-100 pb-6">
            <h1 class="text-3xl font-bold text-green-600 flex items-center gap-3">
                <span class="text-5xl">✨</span> きょうの ふりかえり
            </h1>
            <div class="flex flex-col gap-2 w-full md:w-auto">
                <input type="date" id="dateInput" class="border-2 border-green-200 rounded-xl p-2 text-lg text-center">
                <input type="text" id="nameInput" placeholder="なまえを かこう" class="border-b-4 border-green-400 focus:outline-none text-2xl font-bold p-1 text-center placeholder:text-gray-300">
            </div>
        </div>

        <!-- 教科えらび -->
        <div class="mb-10">
            <p class="text-xl font-bold mb-4 text-gray-700 flex items-center gap-2">
                <span class="bg-yellow-400 text-white rounded-full w-8 h-8 flex items-center justify-center text-sm">1</span>
                なにを したかな？
            </p>
            <div class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-7 gap-3" id="subjectGroup">
                <button onclick="toggleSelect(this)" class="card-choice py-3 px-1 rounded-xl text-lg font-bold">こくご</button>
                <button onclick="toggleSelect(this)" class="card-choice py-3 px-1 rounded-xl text-lg font-bold">さんすう</button>
                <button onclick="toggleSelect(this)" class="card-choice py-3 px-1 rounded-xl text-lg font-bold">せいかつ</button>
                <button onclick="toggleSelect(this)" class="card-choice py-3 px-1 rounded-xl text-lg font-bold">たいいく</button>
                <button onclick="toggleSelect(this)" class="card-choice py-3 px-1 rounded-xl text-lg font-bold">おんがく</button>
                <button onclick="toggleSelect(this)" class="card-choice py-3 px-1 rounded-xl text-lg font-bold">ずこう</button>
                <button onclick="toggleSelect(this)" class="card-choice py-3 px-1 rounded-xl text-lg font-bold">その他</button>
            </div>
        </div>

        <!-- 評価と気持ち -->
        <div class="space-y-10 mb-10">
            <!-- できたかな -->
            <section>
                <p class="text-xl font-bold mb-4 text-gray-700 flex items-center gap-2">
                    <span class="bg-blue-400 text-white rounded-full w-8 h-8 flex items-center justify-center text-sm">2</span>
                    おべんきょうは どうだった？
                </p>
                <div class="grid grid-cols-3 gap-4" id="scoreGroup">
                    <div onclick="selectOnlyOne(this, 'scoreGroup')" class="card-choice">
                        <div class="icon-circle color-good">😆</div>
                        <span class="text-lg font-bold text-green-700">よくできた！</span>
                    </div>
                    <div onclick="selectOnlyOne(this, 'scoreGroup')" class="card-choice">
                        <div class="icon-circle color-normal">🙂</div>
                        <span class="text-lg font-bold text-blue-700">できた</span>
                    </div>
                    <div onclick="selectOnlyOne(this, 'scoreGroup')" class="card-choice">
                        <div class="icon-circle color-hard">🤔</div>
                        <span class="text-lg font-bold text-orange-700">むずかしい</span>
                    </div>
                </div>
            </section>

            <!-- 今日のきもち -->
            <section>
                <p class="text-xl font-bold mb-4 text-gray-700 flex items-center gap-2">
                    <span class="bg-pink-400 text-white rounded-full w-8 h-8 flex items-center justify-center text-sm">3</span>
                    いまの きもちは？
                </p>
                <div class="grid grid-cols-3 gap-4" id="moodGroup">
                    <div onclick="selectOnlyOne(this, 'moodGroup')" class="card-choice">
                        <div class="icon-circle color-good">☀️</div>
                        <span class="text-lg font-bold text-green-700">たのしい！</span>
                    </div>
                    <div onclick="selectOnlyOne(this, 'moodGroup')" class="card-choice">
                        <div class="icon-circle color-normal">☁️</div>
                        <span class="text-lg font-bold text-blue-700">ふつう</span>
                    </div>
                    <div onclick="selectOnlyOne(this, 'moodGroup')" class="card-choice">
                        <div class="icon-circle color-hard">☔️</div>
                        <span class="text-lg font-bold text-orange-700">つかれた</span>
                    </div>
                </div>
            </section>
        </div>

        <!-- 自由記述 -->
        <div class="mb-10">
            <p class="text-xl font-bold mb-3 text-purple-600">💡 ひとこと メッセージ</p>
            <textarea id="memoInput" class="w-full border-4 border-purple-100 rounded-3xl h-32 p-4 text-xl focus:outline-none focus:border-purple-300" placeholder="がんばったことを おしえてね"></textarea>
        </div>

        <!-- 操作ボタン -->
        <div class="flex flex-col items-center gap-4 no-print border-t-4 border-dashed border-gray-100 pt-8">
            <button id="lockBtn" onclick="toggleLock()" class="bg-green-500 hover:bg-green-600 text-white font-bold py-5 px-16 rounded-full shadow-xl transition-all active:scale-95 text-2xl">
                ✅ できた！
            </button>
            <p id="hintText" class="text-gray-400 font-bold">おわったら 「できた！」を おしてね</p>
        </div>
    </div>

    <script>
        document.getElementById('dateInput').valueAsDate = new Date();
        let isLocked = false;

        function toggleLock() {
            const sheet = document.getElementById('mainSheet');
            const lockBtn = document.getElementById('lockBtn');
            const hintText = document.getElementById('hintText');
            const inputs = ['nameInput', 'dateInput', 'memoInput'];

            isLocked = !isLocked;

            if (isLocked) {
                sheet.classList.add('is-locked');
                lockBtn.innerHTML = "✏️ なおす";
                lockBtn.classList.replace('bg-green-500', 'bg-orange-400');
                hintText.innerHTML = "まちがえたときは 「なおす」を おしてね";
                inputs.forEach(id => document.getElementById(id).disabled = true);
            } else {
                sheet.classList.remove('is-locked');
                lockBtn.innerHTML = "✅ できた！";
                lockBtn.classList.replace('bg-orange-400', 'bg-green-500');
                hintText.innerHTML = "おわったら 「できた！」を おしてね";
                inputs.forEach(id => document.getElementById(id).disabled = false);
            }
        }

        function toggleSelect(el) {
            if (isLocked) return;
            el.classList.toggle('selected');
        }

        function selectOnlyOne(el, groupId) {
            if (isLocked) return;
            const group = document.getElementById(groupId);
            const items = group.querySelectorAll('.card-choice');
            items.forEach(item => item.classList.remove('selected'));
            el.classList.add('selected');
        }
    </script>
</body>
</html>
